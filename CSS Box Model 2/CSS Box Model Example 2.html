<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model Example</title>
    <!--filename:CSSBoxModel.html-->
    <style>

        /* Global Styles */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 20px;
        }

        /* Box Styling */
        .box {
            width: 250px;
            height: 150px;
            background-color: #2A7D9;
            color: #ffffff;
            padding: 20px;
            border: 5px solid #F05A06;
            margin: 20px auto;
            text-align: center;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.2);
        }

        /* Different Box Model Effects */
        .box:hover {
            background-color: #A27333;
            border-color: #FE2E57;
        }

    </style>
</head>

<body>

    <h2>CSS Box Model Example</h2>

    <div class="box">
        <p>This is a box.</p>
    </div>

</body>
</html>
